<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Asistente visual para personas ciegas">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <title>OjosParaCiego - Control</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png"
        href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
    <link rel="stylesheet" href="css/styles.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="header" role="banner">
            <h1 id="view-title">Asistencia Visual</h1>
            <div id="connection-status" class="status disconnected" aria-live="polite">
                Desconectado
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content" role="main">
            <!-- Hidden canvas for capture -->
            <canvas id="capture-canvas" style="display:none;"></canvas>

            <!-- VIEW: CONTROL -->
            <section id="view-control" class="tab-view active-view">
                <div id="current-mode" class="mode-display">
                    Modo: <span id="mode-text">Inactivo</span>
                </div>

                <!-- Camera + Response combined display -->
                <div class="vision-display">
                    <video id="camera-preview" autoplay playsinline muted></video>
                    <div id="response-overlay">
                        <p id="response-text">Esperando acción...</p>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="action-buttons">
                    <button id="btn-navigation" class="action-btn navigation-btn" aria-label="Activar navegación">
                        <i class="fa-solid fa-person-walking"></i>
                        <span>Navegación</span>
                    </button>
                    <button id="btn-search" class="action-btn search-btn" aria-label="Buscar objeto">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>Buscar</span>
                    </button>
                </div>

                <div class="action-buttons">
                    <button id="btn-analyze" class="action-btn analyze-btn" aria-label="Analizar escena">
                        <i class="fa-solid fa-camera"></i>
                        <span>Analizar</span>
                    </button>
                    <button id="btn-stop" class="action-btn stop-btn hidden" aria-label="Detener">
                        <i class="fa-solid fa-stop"></i>
                        <span>Detener</span>
                    </button>
                </div>
            </section>

            <!-- Voice input indicator -->
            <div id="voice-indicator" class="voice-indicator hidden" aria-live="assertive">
                <div class="voice-wave"></div>
                <span>Escuchando...</span>
            </div>
        </main>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn active">
                <i class="fa-solid fa-eye"></i>
                <span>Control</span>
            </a>
            <a href="galeria.html" class="nav-btn">
                <i class="fa-solid fa-images"></i>
                <span>Galería</span>
            </a>
            <a href="dispositivo.html" class="nav-btn">
                <i class="fa-solid fa-mobile-screen"></i>
                <span>Dispositivo</span>
            </a>
            <a href="ajustes.html" class="nav-btn">
                <i class="fa-solid fa-gear"></i>
                <span>Ajustes</span>
            </a>
        </nav>

        <!-- Audio player (hidden) -->
        <audio id="audio-player" aria-hidden="true"></audio>

        <!-- Loading overlay -->
        <div id="loading-overlay" class="loading-overlay hidden" aria-hidden="true">
            <div class="spinner"></div>
            <p>Procesando...</p>
        </div>

        <!-- Error modal -->
        <div id="error-modal" class="modal hidden" role="alertdialog" aria-labelledby="error-title">
            <div class="modal-content">
                <h2 id="error-title">Error</h2>
                <p id="error-message"></p>
                <button id="error-close" class="modal-btn">Cerrar</button>
            </div>
        </div>

        <!-- Permission request -->
        <div id="permission-modal" class="modal" role="dialog" aria-labelledby="permission-title">
            <div class="modal-content">
                <h2 id="permission-title">Permisos necesarios</h2>
                <p>Esta aplicación necesita acceso a:</p>
                <ul class="permission-list">
                    <li><i class="fa-solid fa-camera"></i> Cámara (para detectar obstáculos)</li>
                    <li><i class="fa-solid fa-microphone"></i> Micrófono (para comandos de voz)</li>
                </ul>
                <button id="permission-grant" class="modal-btn primary full-width-btn">Permitir acceso</button>
            </div>
        </div>
    </div>

    <script src="js/websocket.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>

</html>
